[tools]
rust = "stable"
# macOS must use Homebrew/system Zig for libghostty; mise manages Zig elsewhere.
zig = { version = "0.15.2", os = ["linux", "windows"] }

[tasks.build]
description = "Build the bootty app with dynamic local linkage; pass --static for distribution or --fast for fast-release"
run = "./scripts/build-bootty-unix.sh"
run_windows = "pwsh ./scripts/build-bootty-windows.ps1"

[tasks.launch]
description = "Build and launch the bootty app; args after -- are passed to Bootty"
run = "./scripts/launch-bootty-unix.sh"
run_windows = "pwsh ./scripts/launch-bootty-windows.ps1"

[tasks."site:build"]
description = "Build the Cloudflare Pages site from Rust/WASM source"
run = """
#!/usr/bin/env bash
set -euo pipefail
rustup target add wasm32-unknown-unknown
bun install --frozen-lockfile
bun run build:web
"""

[tasks.test]
description = "Run workspace lib and integration tests with nextest"
run = "cargo nextest run --workspace --lib --tests"

[tasks."test:cargo"]
description = "Run workspace lib and integration tests with cargo's built-in runner"
run = "cargo test --workspace --lib --tests"

[tasks."test:doc"]
description = "Run workspace doc-tests"
run = "cargo test --workspace --doc"

[tasks."test:wgpu"]
description = "Run WGPU offscreen pixel readback tests"
run = "cargo test -p bootty-app --test terminal_background_wgpu -- --ignored"

[tasks."test:full"]
description = "Run the full Cargo test suite including doc-tests"
run = "cargo test --workspace"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks."hakari:generate"]
description = "Regenerate the cargo-hakari workspace hack"
run = "cargo hakari generate && cargo hakari manage-deps --yes"

[tasks."hakari:check"]
description = "Check the cargo-hakari workspace hack is up to date"
run = "cargo hakari generate --diff && cargo hakari manage-deps --dry-run"

[tasks.clippy]
description = "Run clippy on the workspace"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks."bench:build"]
description = "Compile the fast CPU/egui paint plan benchmark smoke"
run = "cargo test -p bootty-app --bench paint_plan --no-run"

[tasks."bench:build:release"]
description = "Compile the CPU/egui paint plan benchmark in bench profile"
run = "cargo bench -p bootty-app --bench paint_plan --no-run"

[tasks."bench:build:wgpu"]
description = "Compile the WGPU paint plan benchmark"
run = "cargo bench -p bootty-app --bench paint_plan_wgpu --no-run"

[tasks."bench:build:workspace"]
description = "Compile all workspace benchmarks without running them"
run = "cargo bench --workspace --no-run"

[tasks."bench:smoke"]
description = "Run the fast CPU/egui paint plan benchmark smoke"
run = "cargo test -p bootty-app --bench paint_plan"

[tasks."bench:perf"]
description = "Run CPU/egui paint plan Criterion measurements"
run = "cargo bench -p bootty-app --bench paint_plan -- --noplot"

[tasks."bench:perf:wgpu"]
description = "Run WGPU paint plan Criterion measurements"
run = "cargo bench -p bootty-app --bench paint_plan_wgpu -- --noplot"

[tasks."bench:ci"]
description = "Run the fast benchmark smoke gate for blocking CI"
run = "scripts/run-benchmark-suite.sh --ci-smoke --output artifacts/benchmark-reproduction/ci"

[tasks."bench:overnight"]
description = "Run the full benchmark reproduction suite for scheduled CI"
run = "scripts/run-benchmark-suite.sh --quick --output artifacts/benchmark-reproduction/overnight"

[tasks.package]
description = "Package the app bundle with dynamic local linkage; pass --static for distribution or --fast for fast-release"
run = "./scripts/package-bootty-unix.sh"

[tasks."package:windows"]
description = "Package the Windows zip with dynamic local linkage; pass --static for distribution or --fast for fast-release"
run = "pwsh ./scripts/package-bootty-windows.ps1"

[tasks.install]
description = "Package and install Bootty with dynamic local linkage; pass --static for distribution or --fast for fast-release"
run = "./scripts/install-bootty-unix.sh"
run_windows = "pwsh ./scripts/install-bootty-windows.ps1"
