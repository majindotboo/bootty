[tools]
rust = "stable"
zig = "0.15.2"

[tasks.build]
description = "Build the bootty app in release mode"
run = "cargo build --release -p bootty-app --bin bootty"

[tasks.test]
description = "Run workspace lib and integration tests with nextest"
run = "cargo nextest run --workspace --lib --tests"

[tasks."test:cargo"]
description = "Run workspace lib and integration tests with cargo's built-in runner"
run = "cargo test --workspace --lib --tests"

[tasks."test:doc"]
description = "Run workspace doc-tests"
run = "cargo test --workspace --doc"

[tasks."test:wgpu"]
description = "Run WGPU offscreen pixel readback tests"
run = "cargo test -p bootty-app --test terminal_background_wgpu -- --ignored"

[tasks."test:full"]
description = "Run the full Cargo test suite including doc-tests"
run = "cargo test --workspace"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy on the workspace"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks."bench:build"]
description = "Compile the fast CPU/egui paint plan benchmark smoke"
run = "cargo test -p bootty-app --bench paint_plan --no-run"

[tasks."bench:build:release"]
description = "Compile the CPU/egui paint plan benchmark in bench profile"
run = "cargo bench -p bootty-app --bench paint_plan --no-run"

[tasks."bench:build:wgpu"]
description = "Compile the WGPU paint plan benchmark"
run = "cargo bench -p bootty-app --bench paint_plan_wgpu --no-run"

[tasks."bench:build:workspace"]
description = "Compile all workspace benchmarks without running them"
run = "cargo bench --workspace --no-run"

[tasks."bench:smoke"]
description = "Run the fast CPU/egui paint plan benchmark smoke"
run = "cargo test -p bootty-app --bench paint_plan"

[tasks."bench:perf"]
description = "Run CPU/egui paint plan Criterion measurements"
run = "cargo bench -p bootty-app --bench paint_plan -- --noplot"

[tasks."bench:perf:wgpu"]
description = "Run WGPU paint plan Criterion measurements"
run = "cargo bench -p bootty-app --bench paint_plan_wgpu -- --noplot"

[tasks."bench:ci"]
description = "Compile all benchmark targets and run the quick CI benchmark subset"
run = "scripts/run-benchmark-suite.sh --quick --output artifacts/benchmark-reproduction/ci"

[tasks.package]
description = "Package the app bundle (macOS .app zip or Linux tarball)"
run = "./scripts/package-bootty-unix.sh"

[tasks."package:windows"]
description = "Package the Windows zip"
run = "pwsh ./scripts/package-bootty-windows.ps1"

[tasks.install]
description = "Package and install Bootty.app into /Applications (macOS)"
depends = ["package"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if [[ "$(uname -s)" != "Darwin" ]]; then
  echo "install is macOS-only" >&2
  exit 1
fi
rm -rf /Applications/Bootty.app
cp -R dist/Bootty.app /Applications/Bootty.app
echo "Installed /Applications/Bootty.app"
"""
