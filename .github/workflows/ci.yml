name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-validation:
    name: Rust validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

      - name: Run tests
        run: cargo test --workspace

      - name: Compile benchmarks
        run: cargo bench --workspace --no-run

      - name: Run paint plan benchmark smoke
        run: cargo bench -p bootty-app --bench paint_plan -- --noplot

  native-app-bundles:
    name: Native app bundle (${{ matrix.name }})
    needs: rust-validation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-15
            artifact-name: bootty-macos-arm64
          - name: macos-x64
            runner: macos-15-intel
            artifact-name: bootty-macos-x64
          - name: windows-x64
            runner: windows-2025
            artifact-name: bootty-windows-x64
          - name: linux-x64
            runner: ubuntu-24.04
            artifact-name: bootty-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Package native app on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/package-bootty-unix.sh

      - name: Package native app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-bootty-windows.ps1

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/*.zip
            dist/*.tar.gz
