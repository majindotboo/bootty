name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_BENCH_DEBUG: 0

jobs:
  rust-format:
    name: Rust fmt
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise run fmt

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-validation
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Run clippy
        run: mise run clippy

  rust-tests:
    name: Rust tests (nextest)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-validation
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Run tests with nextest
        run: mise run test

  rust-benchmarks:
    name: Rust benchmarks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-validation
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Compile and smoke benchmark suite
        run: mise run bench:ci

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reproduction-${{ github.sha }}
          path: artifacts/benchmark-reproduction/ci
          if-no-files-found: ignore

  rust-cross:
    name: Cross portable crates (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-${{ matrix.target }}
          cache-on-failure: true

      - name: Cross-compile portable crates
        run: >
          cross check
          -p bootty-surface
          -p bootty-ui
          --target ${{ matrix.target }}

  github-pages:
    name: GitHub Pages
    needs: [rust-format, rust-clippy, rust-tests, rust-benchmarks, rust-cross]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: github-pages
          cache-on-failure: true

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install website dependencies
        run: bun install --frozen-lockfile

      - name: Build GitHub Pages site
        run: bun run build:web

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  native-app-bundles:
    name: Native app bundle (${{ matrix.name }})
    needs: [rust-format, rust-clippy, rust-tests, rust-benchmarks, rust-cross]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-26
            artifact-name: bootty-macos-arm64
          - name: macos-x64
            runner: macos-15-intel
            artifact-name: bootty-macos-x64
          - name: windows-x64
            runner: windows-2025
            artifact-name: bootty-windows-x64
          - name: linux-x64
            runner: ubuntu-24.04
            artifact-name: bootty-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Select Xcode 26
        if: runner.os == 'macOS'
        # Oldest 26.x on the image: actool needs 26.0+ for the Liquid Glass
        # icon, while the 26.4 SDK breaks zig's linker (ziglang/zig#31658).
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | head -1)/Contents/Developer"

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-${{ matrix.name }}
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Package native app on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: mise run package

      - name: Package native app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: mise run package:windows

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/*.zip
            dist/*.tar.gz
