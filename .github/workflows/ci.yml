name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_BENCH_DEBUG: 0

jobs:
  rust-validation:
    name: Rust validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Check formatting
        run: mise run fmt

      - name: Run clippy
        run: mise run clippy

      - name: Run tests
        run: mise run test

      - name: Compile benchmarks
        run: mise run bench:build

      - name: Run paint plan benchmark smoke
        run: mise run bench:smoke

  github-pages:
    name: GitHub Pages
    needs: rust-validation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise toolchain
        uses: jdx/mise-action@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/bootty-tauri/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: github-pages

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install website dependencies
        working-directory: crates/bootty-tauri
        run: npm ci

      - name: Build website WASM package
        working-directory: crates/bootty-tauri
        run: npm run build:site-wasm

      - name: Build GitHub Pages site
        working-directory: crates/bootty-tauri
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/bootty-tauri/pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  native-app-bundles:
    name: Native app bundle (${{ matrix.name }})
    needs: rust-validation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-26
            artifact-name: bootty-macos-arm64
          - name: macos-x64
            runner: macos-15-intel
            artifact-name: bootty-macos-x64
          - name: windows-x64
            runner: windows-2025
            artifact-name: bootty-windows-x64
          - name: linux-x64
            runner: ubuntu-24.04
            artifact-name: bootty-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Select Xcode 26
        if: runner.os == 'macOS'
        # Oldest 26.x on the image: actool needs 26.0+ for the Liquid Glass
        # icon, while the 26.4 SDK breaks zig's linker (ziglang/zig#31658).
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | head -1)/Contents/Developer"

      - name: Set up mise toolchain
        uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: |
          cargo clean -p libghostty-vt-sys
          cargo clean --release -p libghostty-vt-sys

      - name: Package native app on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: mise run package

      - name: Package native app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: mise run package:windows

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/*.zip
            dist/*.tar.gz
