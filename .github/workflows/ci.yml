name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_BENCH_DEBUG: 0

jobs:
  rust-format:
    name: Rust fmt
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise run fmt

  rust-validation:
    name: Rust validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxdo-dev \
            pkg-config

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-validation
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: cargo clean -p libghostty-vt-sys

      - name: Run clippy
        run: mise run clippy

      - name: Run tests with nextest
        run: mise run test

      - name: Compile and smoke benchmark suite
        run: mise run bench:ci

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reproduction-${{ github.sha }}
          path: artifacts/benchmark-reproduction/ci
          if-no-files-found: ignore

  rust-cross:
    name: Cross portable crates (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-${{ matrix.target }}
          cache-on-failure: true

      - name: Cross-compile portable crates
        run: >
          cross check
          -p bootty-surface
          -p bootty-ui
          --target ${{ matrix.target }}

  native-app-bundles:
    name: Native app bundle (${{ matrix.name }})
    needs: [rust-format, rust-validation, rust-cross]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-26
            artifact-name: bootty-macos-arm64
          - name: macos-x64
            runner: macos-15-intel
            artifact-name: bootty-macos-x64
          - name: windows-x64
            runner: windows-2025
            artifact-name: bootty-windows-x64
          - name: linux-x64
            runner: ubuntu-24.04
            artifact-name: bootty-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Select Xcode 26
        if: runner.os == 'macOS'
        # Oldest 26.x on the image: actool needs 26.0+ for the Liquid Glass
        # icon, while the 26.4 SDK breaks zig's linker (ziglang/zig#31658).
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | head -1)/Contents/Developer"

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-${{ matrix.name }}
          cache-on-failure: true

      # zig compiles libghostty for the build machine's exact CPU, so its
      # cached output can SIGILL on a runner with a different microarch.
      - name: Evict CPU-specific zig artifacts
        run: cargo clean -p libghostty-vt-sys

      - name: Package native app on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: mise run package

      - name: Package native app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: mise run package:windows

      - name: Upload native app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/*.zip
            dist/*.tar.gz
