<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bootty terminal UI and renderer for native and web apps" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
